---
name: release-chart
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch: {}
permissions:
  contents: read
  packages: write
env:
  HELM_VERSION: v3.19.0
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}
      - name: helm lint (all charts)
        run: |
          for dir in charts/baremetal-discovery charts/baremetal-host charts/baremetal-lifecycle charts/kubernetes-cluster; do
            helm lint "$dir"
          done
      - name: helm package (all charts)
        run: |
          mkdir -p dist
          for dir in charts/baremetal-discovery charts/baremetal-host charts/baremetal-lifecycle charts/kubernetes-cluster; do
            helm package "$dir" --destination dist
          done
      - name: helm registry login (GHCR)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin
      - name: helm push (all charts)
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          for tgz in dist/*.tgz; do
            helm push "$tgz" "oci://ghcr.io/${owner}/charts"
          done
