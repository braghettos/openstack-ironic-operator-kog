# Node CR - rest-dynamic-controller syncs this to Ironic.
# No Port CRs and no instance_info: discovery doesn't need either. The Node carries just
# enough driver_info for Ironic to reach the BMC and run inspect.
{{- if .Values.nodeName }}
apiVersion: {{ include "baremetal-discovery.nodeApiVersion" . }}
kind: Node
metadata:
  name: {{ .Values.nodeName }}
  namespace: {{ include "baremetal-discovery.nodeNamespace" . }}
  labels:
    app.kubernetes.io/name: baremetal-discovery
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  configurationRef:
    name: {{ include "baremetal-discovery.configName" . }}
    namespace: {{ include "baremetal-discovery.nodeNamespace" . }}
  name: {{ .Values.nodeName }}
  driver: {{ .Values.driver }}
  driver_info: {{- toYaml (.Values.driver_info | default dict) | nindent 4 }}
  {{- if .Values.nodeUuid }}
  uuid: {{ .Values.nodeUuid | quote }}
  {{- end }}
  {{- if .Values.parentNode }}
  parent_node: {{ .Values.parentNode | quote }}
  {{- end }}
{{- end }}
