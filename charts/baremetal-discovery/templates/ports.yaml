# Port CRs - one per .Values.ports entry. rest-dynamic-controller POSTs each to
# /v1/ports against the Ironic API, linking the NIC MAC to this Node.
#
# Each port references the Node by uuid (.Values.nodeUuid). Pinning nodeUuid is therefore
# required when ports are declared, otherwise we can't form the link in advance of the Node's
# create (Ironic generates the uuid only after POST /v1/nodes returns).
#
# pxe_enabled selects the boot interface. Optional fields (physical_network, portgroup_uuid,
# local_link_connection, extra) pass through as-is when set on each port entry.
{{/*
nodeUuid is required to render Port CRs (Ports link to the Node by uuid, which Ironic
generates after POST unless we pin it). Skip silently when missing - cdc's chart-inspector
dry-renders with empty values to compute RBAC, and a hard `fail` here blocks Observe entirely.
*/}}
{{- if and .Values.nodeName .Values.ports .Values.nodeUuid }}
{{- $top := . -}}
{{- range $i, $p := .Values.ports }}
{{- $port := $p }}
{{- if kindIs "string" $p }}{{ $port = dict "address" $p }}{{ end }}
{{- $addr := required "port entry must include an address (MAC)" $port.address }}
{{- $safe := regexReplaceAll "[^a-z0-9]+" (lower $addr) "-" }}
{{- $safe = trimAll "-" $safe }}
---
apiVersion: {{ include "baremetal-discovery.nodeApiVersion" $top }}
kind: Port
metadata:
  name: {{ printf "%s-%s" $top.Values.nodeName $safe | trunc 63 | trimSuffix "-" }}
  namespace: {{ include "baremetal-discovery.nodeNamespace" $top }}
  labels:
    app.kubernetes.io/name: baremetal-discovery
    app.kubernetes.io/instance: {{ $top.Release.Name }}
    baremetal.ogen.krateo.io/node: {{ $top.Values.nodeName | quote }}
spec:
  configurationRef:
    name: {{ include "baremetal-discovery.configName" $top }}
    namespace: {{ include "baremetal-discovery.nodeNamespace" $top }}
  address: {{ $addr | quote }}
  node_uuid: {{ $top.Values.nodeUuid | quote }}
  {{- if hasKey $port "pxe_enabled" }}
  pxe_enabled: {{ $port.pxe_enabled }}
  {{- end }}
  {{- with $port.physical_network }}
  physical_network: {{ . | quote }}
  {{- end }}
  {{- with $port.portgroup_uuid }}
  portgroup_uuid: {{ . | quote }}
  {{- end }}
  {{- with $port.local_link_connection }}
  local_link_connection: {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $port.extra }}
  extra: {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
