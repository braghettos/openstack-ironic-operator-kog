# State manageable -> inspecting -> manageable.
#
# Rendered through the FULL inspect window (manageable + inspecting + inspect wait) so the
# NodeProvision CR persists across the roundtrip - if it got pruned during `inspecting`
# and re-rendered on return to `manageable`, KOG would see a fresh CR and re-fire the PUT,
# looping forever. With the wide state set, KOG's 202/Pending guard holds the CR steady
# and inspect runs exactly once.
#
# Terminal: this chart has no provide/deploy step. After inspection completes the node
# stays at `manageable` with `status.properties` + `status.inspection_finished_at` filled
# in by Ironic. Read those, build a baremetal-lifecycle spec, delete the discovery CR
# (which deletes the Node from Ironic), then apply the lifecycle CR.
{{- if .Values.nodeName }}
{{- $state := include "baremetal-discovery.provisionState" . }}
{{- if or (eq $state "manageable") (eq $state "inspecting") (eq $state "inspect wait") }}
apiVersion: {{ include "baremetal-discovery.nodeApiVersion" . }}
kind: NodeProvision
metadata:
  name: {{ .Release.Name }}-inspect
  namespace: {{ include "baremetal-discovery.nodeNamespace" . }}
  labels:
    app.kubernetes.io/name: baremetal-discovery
    app.kubernetes.io/instance: {{ .Release.Name }}
    baremetal.ogen.krateo.io/transition: inspect
spec:
  node_id: {{ .Values.nodeName | quote }}
  target: inspect
{{- end }}
{{- end }}
