# State enroll -> manageable. Same shape as the lifecycle chart's manage transition: fires
# PUT /v1/nodes/<id>/states/provision {target: manage} once via KOG's 202/Pending guard.
{{- if .Values.nodeName }}
{{- if eq (include "baremetal-discovery.provisionState" .) "enroll" }}
apiVersion: {{ include "baremetal-discovery.nodeApiVersion" . }}
kind: NodeProvision
metadata:
  name: {{ .Release.Name }}-manage
  namespace: {{ include "baremetal-discovery.nodeNamespace" . }}
  labels:
    app.kubernetes.io/name: baremetal-discovery
    app.kubernetes.io/instance: {{ .Release.Name }}
    baremetal.ogen.krateo.io/transition: manage
spec:
  node_id: {{ .Values.nodeName | quote }}
  target: manage
{{- end }}
{{- end }}
