# baremetal-discovery chart values
# Drives enroll -> manage -> inspect -> manageable. Inventory is read from the Node CR's
# status (properties + inspection_finished_at), populated by KOG via the Ironic API.

nodeName: ""
# Optional pinned UUID. Preserve it if you intend to re-enroll the same node later under
# baremetal-lifecycle and want to keep parent_node references intact across the discovery
# -> delete -> lifecycle cycle.
nodeUuid: ""
# Optional parent Node UUID (e.g. blade -> enclosure). Same semantics as the lifecycle chart.
parentNode: ""

driver: ipmi
# driver_info is passed straight to Ironic. Use the keys the driver needs (redfish: redfish_*,
# ipmi: ipmi_*). Empty by default so a --set override doesn't merge stale keys.
driver_info: {}

# Ports required for `inspect_interface: agent` (managed inspection) — Ironic refuses
# `PUT target=inspect` with "Insufficient information ... does not have any port associated".
# Same shape as the lifecycle chart's ports value. Supply at least one MAC; the chart renders
# a Port CR per entry. After discovery completes, deleting this composition deletes the Node
# AND its Ports; the lifecycle chart will re-create them.
ports: []

# Node CR namespace (defaults to release namespace).
nodeNamespace: ""

# Configuration ref for Node CR. Points at the namespace-scoped singleton NodeConfiguration
# (manifests/nodeconfiguration-ironic.yaml). Same singleton both compositions share.
configurationRef:
  name: ironic-endpoint
