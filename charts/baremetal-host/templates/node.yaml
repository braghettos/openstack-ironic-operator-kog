# Node CR — RDC syncs this to Ironic. instance_info is assembled from spec.image +
# spec.configDrive (see _helpers.tpl). Only emit instance_info when image.source is set,
# otherwise Ironic complains about empty image_source on the way to active.
{{- if .Values.nodeName }}
{{- $instanceInfo := include "baremetal-host.instanceInfo" . | fromYaml }}
apiVersion: {{ include "baremetal-host.nodeApiVersion" . }}
kind: Node
metadata:
  name: {{ .Values.nodeName }}
  namespace: {{ include "baremetal-host.nodeNamespace" . }}
  labels:
    app.kubernetes.io/name: baremetal-host
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  configurationRef:
    name: {{ include "baremetal-host.configName" . }}
    namespace: {{ include "baremetal-host.nodeNamespace" . }}
  name: {{ .Values.nodeName }}
  driver: {{ .Values.driver }}
  driver_info: {{- toYaml (.Values.driver_info | default dict) | nindent 4 }}
  {{- if .Values.nodeUuid }}
  uuid: {{ .Values.nodeUuid | quote }}
  {{- end }}
  {{- if .Values.parentNode }}
  parent_node: {{ .Values.parentNode | quote }}
  {{- end }}
  {{- if .Values.maintenance }}
  maintenance: true
  {{- end }}
  {{/* automated_clean: when undeployMode=none, set false proactively so the eventual
       target=deleted skips the IPA cleaning pass. Default (mode=full or unset) leaves
       it unset, deferring to ironic.conf [conductor]automated_clean (usually true). */}}
  {{- if eq (.Values.undeployMode | default "full") "none" }}
  automated_clean: false
  {{- end }}
  {{- if $instanceInfo }}
  instance_info: {{- toYaml $instanceInfo | nindent 4 }}
  {{- end }}
{{- end }}
