# manageable -> cleaning -> manageable, when .Values.cleanSteps is non-empty.
#
# Each cleanSteps array generates a unique CR name (sha256 prefix of the array's JSON),
# so any spec edit -> new CR -> KOG fires a new PUT with the new desired config. The old
# Pending CR sits idle until pruned on the next state change. This is the same "name
# encodes the intent" pattern as transition-power.
#
# Gated on state=manageable so we don't fight active deploys; to clean an active node,
# drop spec.image.source so transition-undeploy drives it back to manageable first.
{{- if and .Values.nodeName .Values.cleanSteps }}
{{- if not (include "baremetal-host.detached" .) }}
{{- if eq (include "baremetal-host.provisionState" .) "manageable" }}
{{- $hash := .Values.cleanSteps | toJson | sha256sum | trunc 10 }}
apiVersion: {{ include "baremetal-host.nodeApiVersion" . }}
kind: NodeProvision
metadata:
  name: {{ printf "%s-clean-%s" .Release.Name $hash | trunc 63 | trimSuffix "-" }}
  namespace: {{ include "baremetal-host.nodeNamespace" . }}
  labels:
    app.kubernetes.io/name: baremetal-host
    app.kubernetes.io/instance: {{ .Release.Name }}
    baremetal.ogen.krateo.io/transition: clean
spec:
  node_id: {{ .Values.nodeName | quote }}
  target: clean
  clean_steps: {{- toYaml .Values.cleanSteps | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
