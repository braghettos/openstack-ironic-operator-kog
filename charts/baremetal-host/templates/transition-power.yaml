# Power control — renders when spec.online is explicitly set.
# CONTINUOUS ENFORCEMENT: name encodes both the target AND the currently observed power
# state, so whenever they diverge we rename the CR (helm sees a fresh resource, KOG fires a
# new PUT). Once they match, the CR's name is stable and KOG's 202/Pending guard prevents
# re-fire. This handles the case where Ironic's deploy step auto-powers the node on after
# active and our "online: false" intent would otherwise be ignored.
{{- if and .Values.nodeName (hasKey .Values "online") (kindIs "bool" .Values.online) (not (include "baremetal-host.detached" .)) }}
{{- $targetWord := ternary "on" "off" .Values.online }}
{{- $observed := include "baremetal-host.powerState" . | replace "power " "" | replace " " "" }}
{{- if eq $observed "" }}{{ $observed = "unknown" }}{{ end }}
apiVersion: {{ include "baremetal-host.nodeApiVersion" . }}
kind: NodePower
metadata:
  name: {{ printf "%s-power-%s-from-%s" .Release.Name $targetWord $observed | trunc 63 | trimSuffix "-" }}
  namespace: {{ include "baremetal-host.nodeNamespace" . }}
  labels:
    app.kubernetes.io/name: baremetal-host
    app.kubernetes.io/instance: {{ .Release.Name }}
    baremetal.ogen.krateo.io/transition: power
spec:
  node_id: {{ .Values.nodeName | quote }}
  target: {{ ternary "power on" "power off" .Values.online | quote }}
{{- end }}
