# Provisioner Job: the composition's implementation of the standalone Ironic
# provision state machine. It is idempotent and forward-only - it drives the node
# (created in Ironic by KOG/rest-dynamic-controller from the Node CR) all the way to
# `active` and STOPS there. Re-runs (on each composition reconcile / helm upgrade) are
# cheap no-ops once the node is active.
#
# Flow (per superuser.openinfra.org standalone Ironic guide):
#   enroll --manage--> (verifying) --> manageable
#          [--inspect--> (inspecting) --> manageable]   (when runInspect=true)
#          --provide--> (cleaning) --> available
#          --deploy(instance_info)--> (deploying) --> active
{{- if .Values.nodeName }}
apiVersion: batch/v1
kind: Job
metadata:
  name: ironic-provision-{{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
  labels:
    app.kubernetes.io/name: baremetal-lifecycle
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 6
  activeDeadlineSeconds: 1200
  template:
    metadata:
      labels:
        app.kubernetes.io/name: baremetal-lifecycle
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: Never
      containers:
        - name: provision
          image: {{ .Values.openstackClientImage | quote }}
          env:
            - name: OS_AUTH_TYPE
              value: {{ .Values.ironicAuthType | quote }}
            - name: OS_ENDPOINT
              value: {{ .Values.ironicApiUrl | quote }}
            - name: OS_BAREMETAL_API_VERSION
              value: {{ .Values.ironicApiVersion | default "1.81" | quote }}
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              NODE={{ .Values.nodeName | quote }}
              W={{ .Values.waitTimeout | default 300 }}
              echo "[provision] target: $NODE -> active (wait=${W}s)"

              # 1. Wait for KOG/rest-dynamic-controller to create the node in Ironic.
              for i in $(seq 1 60); do
                if openstack baremetal node show "$NODE" -f value -c uuid >/dev/null 2>&1; then break; fi
                echo "[provision] waiting for Node CR to sync to Ironic ($i/60)"; sleep 5
              done
              UUID=$(openstack baremetal node show "$NODE" -f value -c uuid)
              echo "[provision] node uuid=$UUID"

              # 2. Ensure ports (PXE MACs) exist - idempotent.
              {{- range .Values.ports }}
              {{- $mac := "" }}{{- if kindIs "map" . }}{{ $mac = .address | default "" }}{{- else if kindIs "string" . }}{{ $mac = . }}{{- end }}
              {{- if $mac }}
              openstack baremetal port list --node "$UUID" -f value -c Address 2>/dev/null | grep -qix {{ $mac | quote }} \
                || openstack baremetal port create --node "$UUID" --address {{ $mac | quote }}
              {{- end }}
              {{- end }}

              st() { openstack baremetal node show "$NODE" -f value -c provision_state; }
              S=$(st); echo "[provision] current state: $S"

              case "$S" in
                active|deploying|"wait call-back")
                  echo "[provision] already provisioning/provisioned ($S)";;
                *)
                  if [ "$S" = "enroll" ]; then
                    openstack baremetal node manage "$NODE" --wait "$W"
                    {{- if .Values.runInspect }}
                    openstack baremetal node inspect "$NODE" --wait "$W"
                    {{- end }}
                    S=$(st)
                  fi
                  if [ "$S" = "manageable" ]; then
                    openstack baremetal node provide "$NODE" --wait "$W"
                    S=$(st)
                  fi
                  if [ "$S" = "available" ]; then
                    {{- if .Values.instance_info.image_source }}
                    openstack baremetal node set "$NODE" --instance-info image_source={{ .Values.instance_info.image_source | quote }}{{ if .Values.instance_info.image_checksum }} --instance-info image_checksum={{ .Values.instance_info.image_checksum | quote }}{{ end }}
                    {{- end }}
                    openstack baremetal node deploy "$NODE" --wait "$W"
                    S=$(st)
                  fi
                  ;;
              esac

              echo "[provision] final state: $S"
              if [ "$S" != "active" ]; then
                echo "[provision] ERROR: node not active. last_error:"
                openstack baremetal node show "$NODE" -f value -c last_error || true
                exit 1
              fi
              echo "[provision] OK: $NODE is active (server provisioned)"
{{- end }}
