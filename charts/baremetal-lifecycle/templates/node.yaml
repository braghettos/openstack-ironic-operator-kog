# Node CR - rest-dynamic-controller syncs this to Ironic API
{{- if .Values.nodeName }}
{{- $instanceInfo := deepCopy .Values.instance_info | default dict }}
{{- $cd := .Values.configDrive | default dict }}
{{- if or $cd.metaData $cd.userData $cd.networkData }}
{{- $configDrive := dict "meta_data" ($cd.metaData | default dict) "user_data" ($cd.userData | default "") "network_data" ($cd.networkData | default dict) }}
{{- $_ := set $instanceInfo "config_drive" $configDrive }}
{{- end }}
apiVersion: {{ include "baremetal-lifecycle.nodeApiVersion" . }}
kind: Node
metadata:
  name: {{ .Values.nodeName }}
  namespace: {{ include "baremetal-lifecycle.nodeNamespace" . }}
  labels:
    app.kubernetes.io/name: baremetal-lifecycle
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  configurationRef:
    name: {{ include "baremetal-lifecycle.configName" . }}
    namespace: {{ include "baremetal-lifecycle.nodeNamespace" . }}
  name: {{ .Values.nodeName }}
  driver: {{ .Values.driver }}
  driver_info: {{- toYaml .Values.driver_info | nindent 4 }}
  {{- if $instanceInfo }}
  instance_info: {{- toYaml $instanceInfo | nindent 4 }}
  {{- end }}
{{- end }}
