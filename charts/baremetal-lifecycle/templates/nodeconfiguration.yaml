# NodeConfiguration CR - required by the KOG-generated Node CRD (configurationRef).
# Carries the headers the rest-dynamic-controller attaches to Ironic requests:
#   - X-Ironic-Endpoint            : Ironic base URL
#   - X-OpenStack-Ironic-API-Version: microversion (Ironic rejects writes without it)
# Note: the local standalone env also runs an nginx sidecar that injects the microversion
# header as a backstop (see local/ironic-standalone.yaml). Skipped when the user points
# configurationRef at a pre-existing NodeConfiguration.
{{- if and .Values.nodeName (not (and .Values.configurationRef .Values.configurationRef.name)) }}
{{- $ep := .Values.ironicApiUrl }}
{{- $ver := .Values.ironicApiVersion | default "1.81" }}
apiVersion: {{ include "baremetal-lifecycle.nodeApiVersion" . }}
kind: NodeConfiguration
metadata:
  name: {{ include "baremetal-lifecycle.configName" . }}
  namespace: {{ include "baremetal-lifecycle.nodeNamespace" . }}
  labels:
    app.kubernetes.io/name: baremetal-lifecycle
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  configuration:
    header:
      create:
        X-Ironic-Endpoint: {{ $ep | quote }}
        X-OpenStack-Ironic-API-Version: {{ $ver | quote }}
      get:
        X-Ironic-Endpoint: {{ $ep | quote }}
        X-OpenStack-Ironic-API-Version: {{ $ver | quote }}
      update:
        X-Ironic-Endpoint: {{ $ep | quote }}
        X-OpenStack-Ironic-API-Version: {{ $ver | quote }}
      delete:
        X-Ironic-Endpoint: {{ $ep | quote }}
        X-OpenStack-Ironic-API-Version: {{ $ver | quote }}
      findby:
        X-Ironic-Endpoint: {{ $ep | quote }}
        X-OpenStack-Ironic-API-Version: {{ $ver | quote }}
{{- end }}
