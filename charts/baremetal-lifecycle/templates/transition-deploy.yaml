# State available -> active (deploy). Rendered only while the Node is `available` (live via
# `lookup`). Fires PUT .../states/provision {target: active} once. instance_info (image) is set
# on the node by KOG from the Node CR spec, so this only needs the target. Terminal: once the
# node is `active`, nothing is rendered.
{{- if .Values.nodeName }}
{{- if eq (include "baremetal-lifecycle.provisionState" .) "available" }}
apiVersion: {{ include "baremetal-lifecycle.nodeApiVersion" . }}
kind: NodeProvision
metadata:
  name: {{ .Release.Name }}-deploy
  namespace: {{ include "baremetal-lifecycle.nodeNamespace" . }}
  labels:
    app.kubernetes.io/name: baremetal-lifecycle
    app.kubernetes.io/instance: {{ .Release.Name }}
    baremetal.ogen.krateo.io/transition: deploy
spec:
  node_id: {{ .Values.nodeName | quote }}
  target: active
  {{- if .Values.configDrive }}
  configdrive: {{- toYaml .Values.configDrive | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
