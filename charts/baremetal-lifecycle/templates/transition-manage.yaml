# State enroll -> manageable. Rendered only while the Node is `enroll` (read live via
# `lookup`). The NodeProvision CR fires PUT /v1/nodes/{node}/states/provision {target: manage}
# exactly once (KOG, via the ironic-node-provision RestDefinition). composition-dynamic-controller
# re-evaluates lookup each reconcile; once the node is manageable this renders nothing and the
# CR is pruned (the provide transition takes over).
{{- if .Values.nodeName }}
{{- if eq (include "baremetal-lifecycle.provisionState" .) "enroll" }}
apiVersion: {{ include "baremetal-lifecycle.nodeApiVersion" . }}
kind: NodeProvision
metadata:
  name: {{ .Release.Name }}-manage
  namespace: {{ include "baremetal-lifecycle.nodeNamespace" . }}
  labels:
    app.kubernetes.io/name: baremetal-lifecycle
    app.kubernetes.io/instance: {{ .Release.Name }}
    baremetal.ogen.krateo.io/transition: manage
spec:
  node_id: {{ .Values.nodeName | quote }}
  target: manage
{{- end }}
{{- end }}
