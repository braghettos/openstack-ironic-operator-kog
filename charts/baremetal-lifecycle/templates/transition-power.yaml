# Power state control. Renders a NodePower CR when .Values.online is explicitly true OR
# false. Each value flip changes the CR's name (suffix encodes the target), so KOG sees a
# fresh resource and fires PUT /v1/nodes/<id>/states/power exactly once per intent. The
# existing CR for the OPPOSITE target is pruned by helm as the chart re-renders.
#
# Ironic returns 409 if the node is already in the requested power state — that's harmless
# (the prior NodePower CR for the same target sits in Pending and is never re-fired). The
# "renaming on flip" is what triggers a new POST/PUT.
#
# .Values.online: leave unset to NOT manage power from this composition (manual control).
{{- if and .Values.nodeName (hasKey .Values "online") (kindIs "bool" .Values.online) }}
{{- $target := ternary "power on" "power off" .Values.online }}
{{- $suffix := ternary "on" "off" .Values.online }}
apiVersion: {{ include "baremetal-lifecycle.nodeApiVersion" . }}
kind: NodePower
metadata:
  name: {{ printf "%s-power-%s" .Release.Name $suffix }}
  namespace: {{ include "baremetal-lifecycle.nodeNamespace" . }}
  labels:
    app.kubernetes.io/name: baremetal-lifecycle
    app.kubernetes.io/instance: {{ .Release.Name }}
    baremetal.ogen.krateo.io/transition: power
spec:
  node_id: {{ .Values.nodeName | quote }}
  target: {{ $target | quote }}
{{- end }}
