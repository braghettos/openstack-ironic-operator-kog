# State manageable -> available. Rendered while the Node is `manageable` (live via
# `lookup`). Fires PUT .../states/provision {target: provide} once. Pruned once available.
# Inspection is OUT OF SCOPE for this chart - run the baremetal-discovery composition
# separately first if you need inventory before provisioning.
{{- if .Values.nodeName }}
{{- if eq (include "baremetal-lifecycle.provisionState" .) "manageable" }}
apiVersion: {{ include "baremetal-lifecycle.nodeApiVersion" . }}
kind: NodeProvision
metadata:
  name: {{ .Release.Name }}-provide
  namespace: {{ include "baremetal-lifecycle.nodeNamespace" . }}
  labels:
    app.kubernetes.io/name: baremetal-lifecycle
    app.kubernetes.io/instance: {{ .Release.Name }}
    baremetal.ogen.krateo.io/transition: provide
spec:
  node_id: {{ .Values.nodeName | quote }}
  target: provide
{{- end }}
{{- end }}
