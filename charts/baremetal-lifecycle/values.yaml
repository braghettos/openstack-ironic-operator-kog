# baremetal-lifecycle chart values
# Used by composition-dynamic-controller; override via Composition spec

nodeName: ""
# Optional pinned UUID. Set when other Nodes reference this one via parent_node and we need
# stable IDs across re-enroll (Ironic accepts uuid on POST). Empty -> Ironic generates one.
nodeUuid: ""
# Optional parent Node UUID (e.g. blade -> enclosure).
parentNode: ""
driver: ipmi
# driver_info is passed straight to Ironic. Caller sets the keys their driver needs:
#   ipmi:    ipmi_address, ipmi_username, ipmi_password [, ipmi_port]
#   redfish: redfish_address, redfish_system_id, redfish_username, redfish_password
#            [, redfish_verify_ca]
# Default is {} so set-merges from values overrides do NOT drag stale keys across drivers.
driver_info:

# Ports rendered as KOG Port CRs (one per entry). Address is the NIC MAC, pxe_enabled
# selects the PXE boot interface. node_uuid is filled in from nodeUuid (must be set).
# Example:
#   ports:
#     - address: "00:60:2f:32:81:01"
#       pxe_enabled: true
ports:

# instance_info required before deploy (available -> active)
# Example:
#   instance_info:
#     image_source: "http://172.19.74.1:8089/debian-12-generic-amd64.qcow2"
#     image_checksum: "http://172.19.74.1:8089/CHECKSUM"
instance_info:

# Config Drive for cloud-init (merged into instance_info at deploy time).
# Ironic builds config drive from meta_data, user_data, network_data.
# Example:
#   configDrive:
#     metaData:
#       hostname: "server1"
#       uuid: "<node-uuid>"
#     userData: |
#       #cloud-config
#       package_update: true
#     networkData:
#       networks: []
#       services: []
configDrive:

# Ironic API endpoint used by the provisioner Job (standalone/noauth).
ironicApiUrl: "http://ironic.openstack.svc.cluster.local:6385"
ironicAuthType: "none"
ironicApiVersion: "1.99"

# Per-transition wait timeout (seconds) passed to `openstack baremetal node ... --wait`.
waitTimeout: 300

# OpenStack client image used by the provisioner Job.
openstackClientImage: "quay.io/airshipit/openstack-client:2026.1-ubuntu_noble"

# Power state control. Omit to NOT manage power from this composition (manual / external
# control). Set to true to drive the BMC to `power on`, false for `power off`. Each flip
# renders a freshly-named NodePower CR so KOG fires a new PUT /states/power.
# online: true

# Node CR namespace (where rest-dynamic-controller watches)
nodeNamespace: ""

# Configuration ref for Node CR. Points at the namespace-scoped singleton NodeConfiguration
# installed by `make restdef-up` (manifests/nodeconfiguration-ironic.yaml). Override only when
# multiple Ironic endpoints coexist in the same namespace; otherwise leave the defaults.
configurationRef:
  name: ironic-endpoint
