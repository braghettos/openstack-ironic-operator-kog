{{/* v0.12.0: chart-managed kubeadm PKI Secret.

     Single source of truth for the cluster CA + front-proxy CA + etcd
     CA + SA signing key. genCA fires on first render; lookup-and-reuse
     on subsequent renders (cdc reconciles every 60s). All CPs mount
     these via cloud-init write_files (kubeadmPkiWriteFiles helper);
     workers mount just the CA cert (kubeadmCaWriteFiles helper) so
     they can verify the discovery-token-ca-cert-hash.

     2-pass apply: first chart render creates this Secret only.
     BaremetalHost templates gate on `kubeadmPkiReady` (=Secret exists
     in live cluster). Second cdc reconcile sees the Secret, BHs render
     with full PKI baked into cloud-init. */}}
{{- $bundle := (include "kubernetes-cluster.kubeadmPkiBundle" . | fromYaml) }}
{{- if $bundle.caCert }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubernetes-cluster.kubeadmPkiSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: kubeadm-pki
    app.kubernetes.io/managed-by: kubernetes-cluster
    app.kubernetes.io/instance: {{ .Values.clusterName | quote }}
type: Opaque
data:
  ca.crt: {{ $bundle.caCert | b64enc }}
  ca.key: {{ $bundle.caKey | b64enc }}
  front-proxy-ca.crt: {{ $bundle.frontProxyCaCert | b64enc }}
  front-proxy-ca.key: {{ $bundle.frontProxyCaKey | b64enc }}
  etcd-ca.crt: {{ $bundle.etcdCaCert | b64enc }}
  etcd-ca.key: {{ $bundle.etcdCaKey | b64enc }}
  sa.key: {{ $bundle.saKey | b64enc }}
  {{/* v0.12.6: etcd-client cert lets replica join.sh authenticate to the
       bootstrap etcd from runcmd time — before kubeadm join has written
       apiserver-etcd-client.crt. Used by wait_for_etcd_no_pending_learner
       and remove_ghost_etcd_members. */}}
  etcd-client.crt: {{ $bundle.etcdClientCert | b64enc }}
  etcd-client.key: {{ $bundle.etcdClientKey | b64enc }}
{{- end }}
