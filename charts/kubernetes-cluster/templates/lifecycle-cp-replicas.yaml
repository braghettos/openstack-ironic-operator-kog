# Render REPLICA control-plane BaremetalHost CRs (HA).
#
# v0.11.4 (was: gate on bootstrap's kubeadm_join + cert_key BEFORE
# rendering replica BHs).
#
# OLD design had a chicken-and-egg: bootstrap waited for etcd quorum
# before running kubeadm init; etcd quorum required 2-of-3 etcd
# members; replicas weren't rendered until kubeadm init produced
# kubeadm_join. Result: bootstrap stuck in `kubeadm init` forever,
# replica BHs never rendered, no quorum.
#
# v0.11.4: render all CP BHs concurrently (gated only on etcd PKI
# Secret existing — the 2-pass apply mechanism). Each CP boots in
# parallel, runs install-etcd.sh, etcd cluster forms quorum via static
# initial-cluster bootstrap. Bootstrap (index 0) runs kubeadm init
# next; replicas (index >0) run a polling script that watches their
# own Node.spec.extra for the chart-bridged kubeadm_join + cert_key,
# then executes kubeadm join. Pure runtime rendezvous; no chart re-
# render of replica BHs needed once they've booted.
{{- $cps := fromYamlArray (include "kubernetes-cluster.cpNodes" .) -}}
{{- $kubeadmReady := include "kubernetes-cluster.kubeadmPkiReady" . -}}
{{- if and (gt (len $cps) 1) $kubeadmReady -}}
{{- $caBundle := include "kubernetes-cluster.mgmtCaBundle" . -}}
{{- if $caBundle -}}
{{- $lcNs := include "kubernetes-cluster.lifecycleNamespace" . -}}
{{- $cluster := .Values.clusterName -}}
{{- range $idx, $cp := $cps }}
{{- if gt $idx 0 }}
---
apiVersion: {{ include "kubernetes-cluster.lifecycleApiVersion" $ }}
kind: {{ include "kubernetes-cluster.lifecycleKind" $ }}
metadata:
  name: {{ printf "%s-cp-%s" $cluster $cp.nodeName | quote }}
  namespace: {{ $lcNs | quote }}
  labels:
    kubernetescluster.ogen.krateo.io/cluster: {{ $cluster | quote }}
    kubernetescluster.ogen.krateo.io/role: control-plane
    kubernetescluster.ogen.krateo.io/cp-role: replica
spec:
  nodeName: {{ $cp.nodeName | quote }}
  nodeNamespace: {{ $lcNs | quote }}
  {{- with $cp.nodeUuid }}
  nodeUuid: {{ . | quote }}
  {{- end }}
  {{- with $cp.parentNode }}
  parentNode: {{ . | quote }}
  {{- end }}
  driver: {{ $cp.driver | quote }}
  {{- with $cp.driver_info }}
  driver_info:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $cp.ports }}
  ports:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  enableInspection: false
  online: true
  image:
    {{- include "kubernetes-cluster.image" $ | nindent 4 }}
  configDrive:
    metaData:
      hostname: {{ $cp.nodeName | quote }}
      role: control-plane
      cp-role: replica
      cluster: {{ $cluster | quote }}
    userData: |
      {{- include "kubernetes-cluster.cpReplicaUserData" $ | nindent 6 }}
    {{- $nd := include "kubernetes-cluster.networkData" (dict "node" $cp) }}
    {{- if $nd }}
    networkData:
      {{- $nd | nindent 6 }}
    {{- end }}
  deployedConfigDriveHash: {{ include "kubernetes-cluster.deployedConfigDriveHash" $ | quote }}
  configurationRef:
    {{- toYaml $.Values.configurationRef | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
