# Render the control-plane BaremetalLifecycle CR.
#
# The CP is the FIRST node to come up; everything else waits on it.
# The userData carries `kubeadm init` (with --control-plane-endpoint
# when set, for HA), a CNI apply, and a `kubectl patch` against the
# management cluster that publishes the join command into the CP's
# own Node.spec.extra.kubeadm_join.
#
# Render is gated on two values resolving:
#   1. controlPlane.node.nodeName (spec) — the operator picks the node
#   2. mgmtCaBundle (live lookup or explicit values fallback) — needed
#      for the cloud-init to trust the management cluster's apiserver
#
# If the CA isn't resolvable yet (kube-root-ca.crt ConfigMap absent and
# no explicit caBundle), we render nothing and cdc re-tries on the next
# reconcile. Fail-closed so we don't bake an unworking publish-join.sh
# into the bare-metal cloud-init at first boot.
{{- $cp := (default (dict) (default (dict) .Values.controlPlane).node) -}}
{{- $caBundle := include "kubernetes-cluster.mgmtCaBundle" . -}}
{{- if and $cp.nodeName $caBundle -}}
---
apiVersion: {{ include "kubernetes-cluster.lifecycleApiVersion" . }}
kind: {{ include "kubernetes-cluster.lifecycleKind" . }}
metadata:
  name: {{ printf "%s-cp-%s" .Values.clusterName $cp.nodeName | quote }}
  namespace: {{ include "kubernetes-cluster.lifecycleNamespace" . | quote }}
  labels:
    kubernetescluster.ogen.krateo.io/cluster: {{ .Values.clusterName | quote }}
    kubernetescluster.ogen.krateo.io/role: control-plane
spec:
  nodeName: {{ $cp.nodeName | quote }}
  {{- with $cp.nodeUuid }}
  nodeUuid: {{ . | quote }}
  {{- end }}
  {{- with $cp.parentNode }}
  parentNode: {{ . | quote }}
  {{- end }}
  driver: {{ $cp.driver | quote }}
  {{- with $cp.driver_info }}
  driver_info:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $cp.ports }}
  ports:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  instance_info:
    {{- include "kubernetes-cluster.instanceInfo" . | nindent 4 }}
  configDrive:
    metaData:
      hostname: {{ $cp.nodeName | quote }}
      role: control-plane
      cluster: {{ .Values.clusterName | quote }}
    userData: |
      {{- include "kubernetes-cluster.cpUserData" . | nindent 6 }}
  configurationRef:
    {{- toYaml .Values.configurationRef | nindent 4 }}
  ironicApiUrl: {{ .Values.ironicApiUrl | quote }}
  ironicApiVersion: {{ .Values.ironicApiVersion | quote }}
{{- end }}
