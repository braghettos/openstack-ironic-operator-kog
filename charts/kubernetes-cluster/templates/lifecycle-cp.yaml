# Render the BOOTSTRAP control-plane BaremetalHost CR.
#
# Since chart v0.5.0 the chart supports HA control planes
# (controlPlane.nodes[] — 1, 3, or 5 entries). This template handles
# index 0: the bootstrap CP, which runs
# `kubeadm init --upload-certs --certificate-key=<key>` and publishes
# BOTH kubeadm_join AND cert_key into its own Node CR's spec.extra.
# Replica CPs are rendered by lifecycle-cp-replicas.yaml gated on
# cert_key being present.
#
# Back-compat: spec.controlPlane.node (legacy single-node shape) is
# still accepted as a fallback for users who haven't migrated.
#
# Render is gated on two values resolving:
#   1. bootstrap CP nodeName — the operator picks the node
#   2. mgmtCaBundle (live lookup or explicit values fallback) — needed
#      for the cloud-init to trust the management cluster's apiserver
#
# Fail-closed: if the CA can't be resolved, no BaremetalHost is rendered.
{{- $cps := fromYamlArray (include "kubernetes-cluster.cpNodes" .) -}}
{{- $bootstrap := dict -}}
{{- if gt (len $cps) 0 -}}{{- $bootstrap = index $cps 0 -}}{{- end -}}
{{- /* Milestone 5a (k8s upgrade by-reimage): when the operator pins
       controlPlane.upgrade.targetNode to this CP, flip render to
       spec.undeploy: true. After Ironic walks back to available, the
       operator clears upgrade.targetNode and the chart redeploys with
       the new .Values.k8sVersion baked into cloud-init. */}}
{{- $upgradeTarget := dig "upgrade" "targetNode" "" (default (dict) .Values.controlPlane) -}}
{{- $undeployForUpgrade := and $upgradeTarget (eq $upgradeTarget $bootstrap.nodeName) -}}
{{/* v0.11.0 gate: for HA clusters, hold rendering until the etcd PKI
     Secret exists in the live cluster (lookup hit). First chart apply
     creates the Secret but BHs don't render. ~60s later cdc reconciles,
     lookup hits, BHs render with real etcd material. Single-CP path
     short-circuits to "yes" — no behavior change for legacy users. */}}
{{- $kubeadmReady := include "kubernetes-cluster.kubeadmPkiReady" . -}}
{{- if and $bootstrap.nodeName $kubeadmReady -}}
---
apiVersion: {{ include "kubernetes-cluster.lifecycleApiVersion" . }}
kind: {{ include "kubernetes-cluster.lifecycleKind" . }}
metadata:
  name: {{ printf "%s-cp-%s" .Values.clusterName $bootstrap.nodeName | quote }}
  namespace: {{ include "kubernetes-cluster.lifecycleNamespace" . | quote }}
  labels:
    kubernetescluster.ogen.krateo.io/cluster: {{ .Values.clusterName | quote }}
    kubernetescluster.ogen.krateo.io/role: control-plane
    kubernetescluster.ogen.krateo.io/cp-role: bootstrap
spec:
  nodeName: {{ $bootstrap.nodeName | quote }}
  nodeNamespace: {{ include "kubernetes-cluster.lifecycleNamespace" . | quote }}
  {{- with $bootstrap.nodeUuid }}
  nodeUuid: {{ . | quote }}
  {{- end }}
  {{- with $bootstrap.parentNode }}
  parentNode: {{ . | quote }}
  {{- end }}
  driver: {{ $bootstrap.driver | quote }}
  {{- with $bootstrap.driver_info }}
  driver_info:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $bootstrap.ports }}
  ports:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  enableInspection: false
  online: true
  image:
    {{- include "kubernetes-cluster.image" . | nindent 4 }}
  {{- if $undeployForUpgrade }}
  undeploy: true
  undeployMode: full
  {{- else }}
  configDrive:
    metaData:
      hostname: {{ $bootstrap.nodeName | quote }}
      role: control-plane
      cp-role: bootstrap
      cluster: {{ .Values.clusterName | quote }}
    userData: |
      {{- include "kubernetes-cluster.cpUserData" . | nindent 6 }}
    {{- $nd := include "kubernetes-cluster.networkData" (dict "node" $bootstrap) }}
    {{- if $nd }}
    networkData:
      {{- $nd | nindent 6 }}
    {{- end }}
  {{- end }}
  deployedConfigDriveHash: {{ include "kubernetes-cluster.deployedConfigDriveHash" . | quote }}
  configurationRef:
    {{- toYaml .Values.configurationRef | nindent 4 }}
{{- end }}
