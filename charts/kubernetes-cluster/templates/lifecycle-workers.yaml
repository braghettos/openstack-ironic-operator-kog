# Render one BaremetalHost per worker. Two flavours:
#
# 1. Workers in spec.workers.nodes — normal deploy. FSM gate is the
#    captured kubeadm-join command in the CP Node CR's
#    spec.extra.kubeadm_join (live lookup). Empty -> nothing renders;
#    cdc re-picks-up on next reconcile.
#
# 2. Workers in spec.workers.removed — drain + undeploy. FSM gate is the
#    workerDrainComplete lookup: the drain Job for this worker must have
#    .status.succeeded == 1 before the BH gets `spec.undeploy: true`.
#    Once Ironic walks the node from active back to available, the
#    operator removes the entry from `removed` entirely and the BH stops
#    being rendered — cdc cleans it up.
{{- /* v0.12.0: workers no longer wait for bootstrap to publish the
       kubeadm-join command — the token + apiserver endpoint + CA hash
       are all chart-deterministic, baked into worker join.sh at
       template time. Workers render concurrently with the bootstrap CP
       and wait at runtime for the apiserver VIP to be reachable. */ -}}
{{- $kubeadmReady := include "kubernetes-cluster.kubeadmPkiReady" . -}}
{{- $lcNs := include "kubernetes-cluster.lifecycleNamespace" . -}}
{{- $cluster := .Values.clusterName -}}
{{- if $kubeadmReady -}}
{{- $workers := default (list) (default (dict) .Values.workers).nodes -}}
{{- range $idx, $w := $workers }}
---
apiVersion: {{ include "kubernetes-cluster.lifecycleApiVersion" $ }}
kind: {{ include "kubernetes-cluster.lifecycleKind" $ }}
metadata:
  name: {{ printf "%s-worker-%s" $cluster $w.nodeName | quote }}
  namespace: {{ $lcNs | quote }}
  labels:
    kubernetescluster.ogen.krateo.io/cluster: {{ $cluster | quote }}
    kubernetescluster.ogen.krateo.io/role: worker
spec:
  nodeName: {{ $w.nodeName | quote }}
  nodeNamespace: {{ $lcNs | quote }}
  {{- with $w.nodeUuid }}
  nodeUuid: {{ . | quote }}
  {{- end }}
  {{- with $w.parentNode }}
  parentNode: {{ . | quote }}
  {{- end }}
  driver: {{ $w.driver | quote }}
  {{- with $w.driver_info }}
  driver_info:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $w.ports }}
  ports:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  enableInspection: false
  online: true
  image:
    {{- include "kubernetes-cluster.image" $ | nindent 4 }}
  configDrive:
    metaData:
      hostname: {{ $w.nodeName | quote }}
      role: worker
      cluster: {{ $cluster | quote }}
    userData: |
      {{- include "kubernetes-cluster.workerUserData" $ | nindent 6 }}
    {{- $nd := include "kubernetes-cluster.networkData" (dict "node" $w) }}
    {{- if $nd }}
    networkData:
      {{- $nd | nindent 6 }}
    {{- end }}
  deployedConfigDriveHash: {{ include "kubernetes-cluster.deployedConfigDriveHash" $ | quote }}
  configurationRef:
    {{- toYaml $.Values.configurationRef | nindent 4 }}
{{- end }}
{{- end }}

{{- /* Removed workers: render BH with spec.undeploy: true once drain
       has completed. The image + driver_info etc. stay set (BH chart
       expects them) — the undeploy gate is the only behaviour change. */}}
{{- $removed := default (list) (default (dict) .Values.workers).removed -}}
{{- range $idx, $w := $removed }}
{{- $drainCtx := dict "Values" $.Values "Release" $.Release "Capabilities" $.Capabilities "workerName" $w.nodeName -}}
{{- $drainDone := include "kubernetes-cluster.workerDrainComplete" $drainCtx -}}
{{- if $drainDone }}
---
apiVersion: {{ include "kubernetes-cluster.lifecycleApiVersion" $ }}
kind: {{ include "kubernetes-cluster.lifecycleKind" $ }}
metadata:
  name: {{ printf "%s-worker-%s" $cluster $w.nodeName | quote }}
  namespace: {{ $lcNs | quote }}
  labels:
    kubernetescluster.ogen.krateo.io/cluster: {{ $cluster | quote }}
    kubernetescluster.ogen.krateo.io/role: worker
    kubernetescluster.ogen.krateo.io/removing: "true"
spec:
  nodeName: {{ $w.nodeName | quote }}
  nodeNamespace: {{ $lcNs | quote }}
  {{- with $w.nodeUuid }}
  nodeUuid: {{ . | quote }}
  {{- end }}
  driver: {{ $w.driver | quote }}
  {{- with $w.driver_info }}
  driver_info:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $w.ports }}
  ports:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  enableInspection: false
  image:
    {{- include "kubernetes-cluster.image" $ | nindent 4 }}
  undeploy: true
  undeployMode: {{ default "full" $w.undeployMode | quote }}
  deployedConfigDriveHash: {{ include "kubernetes-cluster.deployedConfigDriveHash" $ | quote }}
  configurationRef:
    {{- toYaml $.Values.configurationRef | nindent 4 }}
{{- end }}
{{- end }}
