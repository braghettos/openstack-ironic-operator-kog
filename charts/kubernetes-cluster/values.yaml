# kubernetes-cluster chart values. Pure block YAML — no flow brackets.
# All defaults here are *placeholders* for the schema — a real cluster
# overrides them via the KubernetesCluster CR rendered by core-provider.

clusterName: lab

# kubeadm-installed k8s version. Drives the kubelet/kubeadm/kubectl
# package version on every node via cloud-init.
k8sVersion: v1.31.4

# CNI is wired by the CP post-init. Default flannel for simplicity.
cni:
  install: flannel
  manifestUrl: https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml

# OS image deployed onto every blade. Must be cloud-init-enabled and
# Debian/Ubuntu-shaped (the userData uses apt). Override for RHEL/etc.
image:
  source:
  checksum:

# Where the rendered BaremetalLifecycle CRs land (defaults to release ns).
lifecycleNamespace:

# Ironic auth — same shape as BaremetalLifecycle.
configurationRef:
  name: ironic-endpoint
  namespace: openstack

ironicApiUrl: http://ironic.openstack.svc.cluster.local:6385
ironicApiVersion: "1.81"

# Keystone credentials baked into the CP cloud-init so publish-join.sh
# can PATCH Ironic's node.extra directly from the blade. This is the
# rendezvous path for labs where the blade can reach Ironic but NOT the
# management cluster's apiserver (which the chart's mgmtCluster.apiUrl
# was designed for). See scripts/ironic-node-extra-bridge.py for the
# cluster-side propagation back into k8s Node CR spec.extra.
ironicAuth:
  authUrl:    ""           # e.g. http://172.19.74.1:5000
  ironicUrl:  ""           # e.g. http://172.19.74.1:6385
  username:   ""           # e.g. admin
  password:   ""           # plaintext — lab use; rotate after
  userDomain: Default      # keystone user domain

# Management-cluster API the CP cloud-init kubectl-patches to publish
# the join token. URL is reachable from the bare-metal blade's network —
# this is a network design constraint, not a chart concern. See
# `network.managementApiReachability` below for the option matrix
# (kube-vip / MetalLB / external LB / NodePort+DNS).
managementCluster:
  apiUrl: ""
  # CA bundle for the management API. **Deprecated / optional override.**
  # The chart now `lookup`s the auto-projected `kube-root-ca.crt`
  # ConfigMap in the SA namespace (root-ca-cert-publisher controller,
  # k8s 1.20+). Set this only if your management cluster has
  # root-ca-cert-publisher disabled.
  caBundle: ""
  # Service account name + namespace used by the CP to patch its own
  # Node CR. The chart creates the SA + Role + RoleBinding + token
  # Secret (see templates/rbac.yaml) and reads the token at render time.
  serviceAccountName: ""
  serviceAccountNamespace: ""

# Network reachability hint — how the management cluster's API server
# is exposed to bare-metal blades. Pure documentation today; future
# milestones (HA control plane, day-2 ops) will branch on this enum.
# See docs/USER-GUIDE.md "Cluster ingress" for the option matrix.
network:
  podCIDR: 10.244.0.0/16
  serviceCIDR: 10.96.0.0/12
  managementApiReachability: external-lb

# Control plane. Two shapes accepted:
#  - .nodes[]  — preferred, supports 1 / 3 / 5 entries. Index 0 is the
#                BOOTSTRAP CP (runs kubeadm init --upload-certs). Indices
#                1..N-1 are REPLICA CPs (join via --control-plane
#                --certificate-key, gated on Node.spec.extra.cert_key).
#  - .node     — legacy single-CP shape, kept for back-compat. Ignored
#                when .nodes[] is populated.
#
# Day-2 levers (Milestones 5a, 5c):
#  - .upgrade.targetNode      — one CP at a time, drives it through
#                                undeploy -> redeploy to pick up new
#                                .Values.k8sVersion (USER-GUIDE.md
#                                "k8s upgrade by-reimage").
#  - .recovery.failedNodes[]  — recover a failed CP. Each entry gets
#                                rendered with spec.undeploy: true; once
#                                Ironic walks to available, move the
#                                entry back into .nodes[] for re-join.
controlPlane:
  # Stable address kubeadm advertises as the cluster's apiserver. Empty
  # for single-CP (kubeadm uses the node's primary IP). REQUIRED for HA
  # (more than one entry in nodes[]): point at a load-balanced VIP —
  # see docs/USER-GUIDE.md "Cluster ingress" for the option matrix.
  endpoint: ""
  # HA shape — uncomment + fill in with 1, 3, or 5 entries:
  # nodes:
  #   - nodeName: blade06        # bootstrap CP
  #     nodeUuid: 2f05176e-...
  #     driver: redfish
  #     driver_info: {...}
  #     ports: [...]
  #   - nodeName: blade07        # replica CP
  #     nodeUuid: ...
  #     driver: redfish
  #     driver_info: {...}
  #     ports: [...]
  # Legacy single-CP shape:
  node:
    nodeName:
    nodeUuid:
    parentNode:
    driver: redfish
    driver_info:
    ports:
  # Day-2 — rolling k8s upgrade (Milestone 5a). Set this to one CP
  # nodeName at a time to drive it through undeploy -> redeploy so it
  # picks up a new .Values.k8sVersion. Clear (or move to the next node)
  # once Ironic reports the BH back at active.
  upgrade:
    targetNode:
  # Day-2 — failed CP recovery (Milestone 5c). Move an entry from
  # .nodes[] to here when a CP is stuck in deploy failed / wait call-back
  # / etc. Chart renders the BH with spec.undeploy: true; once available,
  # move the entry back into .nodes[] (as a replica index, not 0) and
  # the chart re-renders as a join.
  recovery:
    failedNodes:

# Workers — N of them. Each becomes one BaremetalHost CR with
# kubeadm-join userData, gated on the CP's spec.extra.kubeadm_join.
#
# To drain & remove a worker, move its entry from `nodes` to `removed`.
# The chart renders a drain Job (against the workload apiserver via the
# CP-published kubeconfig Secret), waits for the Job to complete, then
# patches the BH with `spec.undeploy: true` (using the v0.3.4 widened
# undeploy gate from baremetal-host). Once Ironic walks the node back
# to `available`, remove the entry from `removed` entirely — cdc deletes
# the BH and KOG fires DELETE on the Ironic node.
workers:
  drainTimeout: 5m
  nodes:
  removed:
