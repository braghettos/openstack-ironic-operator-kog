# Ironic overrides for openstack-helm deployment
# Use: helm upgrade --install ironic openstack-helm/ironic -n openstack -f deploy/values/ironic-overrides.yaml
#
# Prerequisites: rabbitmq, mariadb, memcached, keystone, glance, neutron
# Conductor requires hostNetwork for PXE/TFTP - set PROVISIONER_INTERFACE to your provisioning NIC
---
pod:
  useHostNetwork:
    conductor: true

conductor:
  http:
    enabled: true
  pxe:
    enabled: true

# Network for PXE/provisioning - adjust for your environment
# device is used as PROVISIONER_INTERFACE env (Linux interface name, e.g. eth1, ens192)
network:
  pxe:
    device: eth1  # CHANGE: set to your provisioning NIC (ip link show)
    neutron_network_name: baremetal
    neutron_subnet_name: baremetal
    neutron_provider_network: ironic
    neutron_subnet_cidr: "172.24.6.0/24"
    neutron_subnet_gateway: "172.24.6.1/24"
    neutron_subnet_alloc_start: "172.24.6.100"
    neutron_subnet_alloc_end: "172.24.6.200"
    neutron_subnet_dns_nameserver: "10.96.0.10"

# Target conductor to nodes with provisioning interface (e.g. label openstack-control-plane=enabled)
labels:
  conductor:
    node_selector_key: openstack-control-plane
    node_selector_value: enabled
