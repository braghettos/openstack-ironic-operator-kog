# Standalone Ironic config for local testing (noauth, sqlite, json-rpc, fake hardware).
# Used with the official openstack-helm image quay.io/airshipit/ironic, running the
# combined `ironic` binary (api + conductor in one process) - no MariaDB/RabbitMQ/Keystone.
[DEFAULT]
debug = false
auth_strategy = noauth
enabled_hardware_types = fake-hardware
enabled_power_interfaces = fake
enabled_management_interfaces = fake
enabled_boot_interfaces = fake
enabled_deploy_interfaces = fake
enabled_inspect_interfaces = fake
enabled_console_interfaces = no-console
enabled_raid_interfaces = no-raid
enabled_bios_interfaces = no-bios
enabled_vendor_interfaces = no-vendor
enabled_rescue_interfaces = no-rescue
enabled_network_interfaces = noop
enabled_storage_interfaces = noop
enabled_firmware_interfaces = no-firmware
default_deploy_interface = fake
default_inspect_interface = fake
default_network_interface = noop
default_rescue_interface = no-rescue
rpc_transport = json-rpc
transport_url = fake://

[database]
connection = sqlite:////tmp/ironic/ironic.sqlite

[api]
host_ip = 0.0.0.0
port = 6385

[json_rpc]
auth_strategy = noauth

[conductor]
automated_clean = false

[pxe]
# fake boot interface does not use PXE; keep TFTP/HTTP roots in writable tmp
tftp_root = /tmp/ironic/tftpboot
tftp_master_path = /tmp/ironic/tftpboot/master_images

[deploy]
http_root = /tmp/ironic/httpboot
