# Discovery composition for blade02b. Drives enroll -> manage -> inspect; once inspection
# completes, node.status.properties + node.status.inspection_finished_at carry the inventory.
# Read those, decide root_device / capabilities / resource_class, then:
#   kubectl delete baremetaldiscovery blade02b
#   kubectl apply -f manifests/baremetallifecycle-blade02.yaml
# (the discovery's delete cascade removes the Node + its Ports from Ironic so the lifecycle
# re-enrolls cleanly with the same UUID.)
---
apiVersion: composition.krateo.io/v0-1-1
kind: BaremetalDiscovery
metadata:
  name: blade03
  namespace: openstack
spec:
  nodeName: blade03
  nodeNamespace: openstack
  nodeUuid: f50684f4-5bde-4f87-8dd6-fa2439b538c7
  parentNode: 5113ab44-faf2-4f76-bb41-ea8b14b7aa92
  driver: redfish
  driver_info:
    redfish_address: http://172.19.74.11:8000
    redfish_verify_ca: false
    redfish_username: ironic
    redfish_password: baremetal
    redfish_system_id: /redfish/v1/Systems/blade03
  # Ports required because Ironic's `inspect_interface: agent` refuses managed inspection
  # without at least one Port (same constraint as deploy validation).
  ports:
    - address: "00:60:2f:33:81:01"
      pxe_enabled: true
    - address: "00:60:2f:33:81:02"
      pxe_enabled: false
