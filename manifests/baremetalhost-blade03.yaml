# Single BaremetalHost CR for blade03 — covers what the discovery + lifecycle split used to.
# Edit any field and the operator reconciles via the JSON-Patch proxy translator.
#
# Phase gates (chart-driven via `lookup` of Node.status):
#   - registering → enroll → manage → manageable
#   - inspecting  (enableInspection: true) → manageable + status.properties populated
#   - available   → provide → cleaning
#   - provisioned (image set) → deploy → wait call-back → active
#
# `online: true|false` drives BMC power continuously (CR is renamed on observed-vs-desired
# mismatch so KOG re-fires after Ironic's deploy-time auto-power-on).
---
apiVersion: composition.krateo.io/v0-1-1
kind: BaremetalHost
metadata:
  name: blade03
  namespace: openstack
spec:
  nodeName: blade03
  nodeNamespace: openstack
  nodeUuid: f50684f4-5bde-4f87-8dd6-fa2439b538c7
  parentNode: 5113ab44-faf2-4f76-bb41-ea8b14b7aa92
  driver: redfish
  driver_info:
    redfish_address: http://172.19.74.11:8000
    redfish_verify_ca: false
    redfish_username: ironic
    redfish_password: baremetal
    redfish_system_id: /redfish/v1/Systems/blade03
  ports:
    - address: "00:60:2f:33:81:01"
      pxe_enabled: true
    - address: "00:60:2f:33:81:02"
      pxe_enabled: false
  enableInspection: true
  image:
    source: http://172.19.74.1:8089/debian-13-genericcloud-amd64.qcow2
    checksum: http://172.19.74.1:8089/CHECKSUM
  online: true
