# Gap 7 (docs/TEST-PLAN.md): inspect failure recovery.
# Wrong Redfish password causes inspect to fail. Verify chart doesn't loop:
# transition-inspect renders once, fires PUT once, Ironic lands in
# `inspect failed`, chart's gate excludes that state -> no further
# NodeProvision, cdc reconcile is idle. Recovery requires manual fix
# (driver_info password) AND a manual target=manage to re-enter manageable.
---
apiVersion: composition.krateo.io/v0-3-3
kind: BaremetalHost
metadata:
  name: blade10
  namespace: openstack
spec:
  nodeName: blade10
  nodeNamespace: openstack
  nodeUuid: fcae4724-4837-4916-8d39-7348b1389a68
  parentNode: 5113ab44-faf2-4f76-bb41-ea8b14b7aa92
  driver: redfish
  driver_info:
    redfish_address: http://172.19.74.11:8000
    redfish_verify_ca: false
    redfish_username: ironic
    redfish_password: wrong-password-intentional   # gap 7: intentionally bogus
    redfish_system_id: /redfish/v1/Systems/blade10
  ports:
    - address: "00:60:2f:3a:81:01"
      pxe_enabled: true
    - address: "00:60:2f:3a:81:02"
      pxe_enabled: false
  enableInspection: true
  # Image NOT set so without the inspect issue the blade would stop at available.
  online: true
