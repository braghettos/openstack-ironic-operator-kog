# BaremetalLifecycle for blade02 (chart 0.3.0). One CR drives:
#   enroll -> manage -> manageable -> provide -> cleaning -> available -> deploy -> active
#
# Inspection is intentionally NOT part of this composition. Run BaremetalDiscovery first
# if you need the inventory (CPU/RAM/disks/NICs) to pick instance_info.root_device etc.,
# then delete the BaremetalDiscovery and apply this lifecycle CR. See
# manifests/baremetaldiscovery-blade02.yaml.
---
apiVersion: composition.krateo.io/v0-3-1
kind: BaremetalLifecycle
metadata:
  name: blade03
  namespace: openstack
spec:
  nodeName: blade03
  nodeNamespace: openstack
  online: false
  # Pinned UUID from Ettore's nodes.yaml. Keep it identical across discovery -> delete ->
  # lifecycle so parent_node references stay valid.
  nodeUuid: f50684f4-5bde-4f87-8dd6-fa2439b538c7
  parentNode: 5113ab44-faf2-4f76-bb41-ea8b14b7aa92
  driver: redfish
  driver_info:
    redfish_address: http://172.19.74.11:8000
    redfish_verify_ca: false
    redfish_username: ironic
    redfish_password: baremetal
    redfish_system_id: /redfish/v1/Systems/blade03
  ports:
    - address: "00:60:2f:33:81:01"
      pxe_enabled: true
    - address: "00:60:2f:33:81:02"
      pxe_enabled: false
  instance_info:
    image_source: http://172.19.74.1:8089/debian-13-genericcloud-amd64.qcow2
    image_checksum: http://172.19.74.1:8089/CHECKSUM
