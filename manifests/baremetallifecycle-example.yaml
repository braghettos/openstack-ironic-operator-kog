# Example composition instance. The kind/apiVersion are generated by core-provider from the
# CompositionDefinition (composition.krateo.io/v0-1-0, kind BaremetalLifecycle).
# composition-dynamic-controller reconciles this, walking the node enroll -> active by
# rendering one NodeProvision per state (gated by lookup of the Node's provision_state).
#
#   kubectl apply -f manifests/baremetallifecycle-example.yaml
---
apiVersion: composition.krateo.io/v0-1-0
kind: BaremetalLifecycle
metadata:
  name: metal-a
  namespace: openstack
spec:
  nodeName: metal-a
  nodeNamespace: openstack
  driver: fake-hardware          # use ipmi/redfish + driver_info for real hardware
  driver_info: {}
  instance_info:
    image_source: http://example.invalid/image.qcow2
    image_checksum: "0"
