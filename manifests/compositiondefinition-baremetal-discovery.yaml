# CompositionDefinition for the baremetal-discovery chart. core-provider generates the
# BaremetalDiscovery CRD and a composition-dynamic-controller that helm-installs the chart
# per instance, re-evaluating lookup() each reconcile to drive enroll -> manage -> inspect.
#
# Sister of compositiondefinition-baremetal-lifecycle.yaml. Both compositions share the
# same KOG-generated CRDs (Node, NodeProvision) and the singleton NodeConfiguration.
---
apiVersion: core.krateo.io/v1alpha1
kind: CompositionDefinition
metadata:
  name: baremetal-discovery
  namespace: krateo-system
spec:
  chart:
    url: http://chartrepo.openstack.svc.cluster.local/baremetal-discovery-0.1.1.tgz
    version: "0.1.1"
