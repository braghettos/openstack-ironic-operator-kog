# CompositionDefinition for the baremetal-lifecycle chart. core-provider consumes this and
# generates a BaremetalLifecycle CRD + a composition-dynamic-controller that helm-installs the
# chart per instance and reconciles it (re-evaluating the chart's `lookup` each reconcile to
# render the per-state NodeProvision transitions).
#
# The chart is published to GHCR as an OCI artifact by .github/workflows/release-chart.yaml on
# tag/dispatch. For local development you may repoint spec.chart.url at an in-cluster chart server.
---
apiVersion: core.krateo.io/v1alpha1
kind: CompositionDefinition
metadata:
  name: baremetal-lifecycle
  namespace: krateo-system
spec:
  chart:
    url: oci://ghcr.io/braghettos/charts/baremetal-lifecycle
    version: "0.3.1"
