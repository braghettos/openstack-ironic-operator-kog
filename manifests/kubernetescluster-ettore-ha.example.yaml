# Sample 3-CP + 3-worker HA KubernetesCluster manifest.
#
# COPY THIS FILE to `kubernetescluster-<yourname>.yaml` (which is
# gitignored) and fill the placeholders (<...>) with your own values.
#
# Placeholders you MUST replace before applying:
#   - <KEYSTONE_ADMIN_PASSWORD>  admin password for the Ironic Keystone
#   - <REDFISH_PASSWORD>         Redfish account password (per-node)
#
# Everything else here is illustrative (lab-specific node UUIDs, MACs,
# OOB IPs, the enclosure parent UUID). Replace with your own inventory.
#
# Single chart, ONE manifest, handles single-CP or HA from controlPlane.nodes[].
# - 1 entry: single-CP (no kube-vip, no replicas, no VIP required)
# - 3 entries: HA (kube-vip on each CP, replicas via runtime VIP-healthz wait)
#
# All PKI + tokens are chart-managed (lookup-or-genCA pattern):
#   - kubeadm cluster CA + front-proxy CA + etcd CA + SA key
#   - bootstrap token (sha256-derived from clusterName, deterministic)
#   - cert-key for kubeadm-certs Secret encryption (also deterministic)
# Replicas + workers know the token/CA hash at chart render time — no
# runtime publish, no Node.spec.extra rendezvous.
#
# Stacked etcd: kubeadm manages etcd cluster expansion natively. The
# ghost-member trap is mitigated by avoiding kubeadm-join retries on
# the same blade — failure → BH auto-redeploy via v0.4.0 baremetal-host
# (Task #89) → fresh OS → fresh kubeadm join attempt.
---
apiVersion: composition.krateo.io/v0-12-11
kind: KubernetesCluster
