        parentNode:  5113ab44-faf2-4f76-bb41-ea8b14b7aa92
        driver:      redfish
        driver_info:
          redfish_address:   http://172.19.74.11:8000
          redfish_password:  baremetal
          redfish_system_id: /redfish/v1/Systems/blade10
          redfish_username:  ironic
          redfish_verify_ca: false
        ports:
          - { address: "00:60:2f:3a:81:01", pxe_enabled: true  }
          - { address: "00:60:2f:3a:81:02", pxe_enabled: false }
      - nodeName:    blade07
        nodeUuid:    dfd4bf28-17c2-4141-83f8-361acdc7a633
        parentNode:  5113ab44-faf2-4f76-bb41-ea8b14b7aa92
        driver:      redfish
        driver_info:
          redfish_address:   http://172.19.74.11:8000
          redfish_password:  baremetal
          redfish_system_id: /redfish/v1/Systems/blade07
          redfish_username:  ironic
          redfish_verify_ca: false
        ports:
          - { address: "00:60:2f:37:81:01", pxe_enabled: true  }
          - { address: "00:60:2f:37:81:02", pxe_enabled: false }
      - nodeName:    blade08
        nodeUuid:    daef0a77-1db5-4181-a577-bcfb31becc72
        parentNode:  5113ab44-faf2-4f76-bb41-ea8b14b7aa92
        driver:      redfish
        driver_info:
          redfish_address:   http://172.19.74.11:8000
          redfish_password:  baremetal
          redfish_system_id: /redfish/v1/Systems/blade08
          redfish_username:  ironic
          redfish_verify_ca: false
        ports:
          - { address: "00:60:2f:38:81:01", pxe_enabled: true  }
          - { address: "00:60:2f:38:81:02", pxe_enabled: false }
