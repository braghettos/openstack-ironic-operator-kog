# Real deployable KubernetesCluster for the Ettore lab.
#
# CP:     blade06 (Redfish on 172.19.74.11:8000 / System blade06)
# Worker: blade10 (Redfish on 172.19.74.11:8000 / System blade10)
# Image:  the same debian-13 cloudimg used by every other baremetalhost-blade*.yaml
#         fixture in this repo.
#
# Two pre-deploy prerequisites the operator owns (they're network design
# calls, not chart concerns):
#
#   1. The bare-metal blades must be able to reach the management
#      cluster's API server (managementCluster.apiUrl) — see
#      docs/USER-GUIDE.md "Cluster ingress" for the option matrix. The
#      placeholder below points at the kind apiserver's NodePort IP from
#      the lab network's perspective. Replace with the real LB / kube-vip
#      / NodePort+DNS address once the network plumbing is wired.
#
#   2. The existing BaremetalHost CRs named `blade06` and `blade10` (from
#      earlier test fixtures) MUST be deleted first — both BHs would fight
#      otherwise:
#         kubectl -n openstack delete baremetalhost blade06 blade10
#      The chart's BHs are named `ettore-cp-blade06` and
#      `ettore-worker-blade10`, distinct names — only the `nodeName`
#      collides, and Krateo lets only one BH per nodeName.
#
#   3. blade04 is in a 24h soak window — DO NOT include it in the cluster
#      until the soak finishes.
#
#   kubectl --kubeconfig local/kubeconfig.ironic-lab --context kind-ironic-lab \
#     apply -f manifests/kubernetescluster-ettore-lab.yaml
---
apiVersion: composition.krateo.io/v0-10-8
kind: KubernetesCluster
metadata:
  name: ettore
  namespace: openstack
spec:
  clusterName: ettore
  k8sVersion: v1.31.4
  cni:
    install: flannel
    manifestUrl: https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
  network:
    podCIDR: 10.244.0.0/16
    serviceCIDR: 10.96.0.0/12
    # Lab path: kubectl-proxy sidecar in wg-ironic-proxy. Not an
    # ingress option from the matrix; documented as the lab-specific
    # wg-tunnel path in the wg-ironic-proxy manifest.
    managementApiReachability: nodeport-dns
  image:
    source: http://172.19.74.1:8089/debian-13-genericcloud-amd64.qcow2
    checksum: http://172.19.74.1:8089/CHECKSUM
  configurationRef:
    name: ironic-endpoint
    namespace: openstack
  ironicApiUrl: http://ironic.openstack.svc.cluster.local:6385
  ironicApiVersion: "1.81"
  # Keystone admin creds baked into the CP cloud-init so publish-join.sh
  # can PATCH Ironic node.extra over the OOB network. The
  # ironic-extra-bridge sidecar in wg-ironic-proxy mirrors that into the
  # k8s Node CR's spec.extra (where the chart's lookup picks it up).
  # Used because this lab routes the wg tunnel one direction only —
  # blades can reach Ironic, but not the management cluster's apiserver.
  ironicAuth:
    authUrl:    http://172.19.74.1:5000
    ironicUrl:  http://172.19.74.1:6385
    username:   admin
    password:   u8kYEOLtciRuiBiEXb2Cj05FImQu09jCQh7VJQ63
    userDomain: Default
  managementCluster:
    # http://198.51.100.5:8443 — the kubectl-proxy sidecar inside the
    # wg-ironic-proxy pod, bound on the wireguard interface so the
    # bare-metal blades reach it through the lab's wg tunnel.
    # See docs/USER-GUIDE.md "Cluster ingress" and the wg-ironic-proxy
    # manifest for the architecture; this is the only address the
    # blades can actually reach the management apiserver on.
    apiUrl: http://198.51.100.5:8443
    # CA bundle not needed for the http path — chart skips the gate.
    # caBundle: |
    #   -----BEGIN CERTIFICATE-----
    #   ...PEM...
    #   -----END CERTIFICATE-----
    serviceAccountName: ettore-cp-publisher
    serviceAccountNamespace: openstack
  controlPlane:
    # Empty for single-CP; populate when Milestone 1 (HA CP) lands and
    # the LB VIP is provisioned.
    endpoint: ""
    node:
      nodeName: blade06
      nodeUuid: 2f05176e-4531-4a90-a3bd-eda84b517d57
      parentNode: 5113ab44-faf2-4f76-bb41-ea8b14b7aa92
      driver: redfish
      driver_info:
        redfish_address: http://172.19.74.11:8000
        redfish_verify_ca: false
        redfish_username: ironic
        redfish_password: baremetal
        redfish_system_id: /redfish/v1/Systems/blade06
      ports:
        - address: "00:60:2f:36:81:01"
          pxe_enabled: true
        - address: "00:60:2f:36:81:02"
          pxe_enabled: false
  workers:
    drainTimeout: 5m
    nodes:
      - nodeName: blade10
        nodeUuid: fcae4724-4837-4916-8d39-7348b1389a68
        parentNode: 5113ab44-faf2-4f76-bb41-ea8b14b7aa92
        driver: redfish
        driver_info:
          redfish_address: http://172.19.74.11:8000
          redfish_verify_ca: false
          redfish_username: ironic
          redfish_password: baremetal
          redfish_system_id: /redfish/v1/Systems/blade10
        ports:
          - address: "00:60:2f:3a:81:01"
            pxe_enabled: true
          - address: "00:60:2f:3a:81:02"
            pxe_enabled: false
