# Example KubernetesCluster: one control plane (blade01) + two workers (blade02, blade03).
# Apply against a cluster where:
#   - the kubernetes-cluster CompositionDefinition has been applied
#   - the baremetal-lifecycle CompositionDefinition has been applied (the
#     chart renders BaremetalLifecycle CRs that depend on this CRD)
#   - the Ironic Node KOG primitive is installed (the chart's lookup reads
#     nodes.baremetal.ogen.krateo.io to gate workers on the CP's join token)
#   - the bare-metal blades can reach the management cluster's API server
#     (managementCluster.apiUrl) — this is a network design constraint
#
#   kubectl apply -f manifests/kubernetescluster-example.yaml
---
apiVersion: composition.krateo.io/v0-1-0
kind: KubernetesCluster
metadata:
  name: lab
  namespace: openstack
spec:
  clusterName: lab
  k8sVersion: v1.31.4
  cni:
    install: flannel
    manifestUrl: https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
  network:
    podCIDR: 10.244.0.0/16
    serviceCIDR: 10.96.0.0/12
    # How the management cluster's apiserver is exposed to the blades.
    # Pin one of: kube-vip, metallb, external-lb, nodeport-dns.
    # See docs/USER-GUIDE.md "Cluster ingress" for the tradeoff matrix.
    managementApiReachability: external-lb
  image:
    source: http://images.local/ubuntu-24.04-cloudimg-amd64.qcow2
    checksum: http://images.local/ubuntu-24.04-cloudimg-amd64.CHECKSUM
  configurationRef:
    name: ironic-config
    namespace: openstack
  ironicApiUrl: http://ironic.openstack.svc.cluster.local:6385
  ironicApiVersion: "1.81"
  managementCluster:
    # Reachable from the bare-metal provisioning network. Pin a stable
    # advertised address (kube-vip, MetalLB, external LB, or
    # NodePort+DNS — see USER-GUIDE.md).
    apiUrl: https://10.0.0.1:6443
    # PEM CA bundle is OPTIONAL since chart v0.2.0 — the chart `lookup`s
    # the auto-projected `kube-root-ca.crt` ConfigMap in the SA namespace
    # by default. Uncomment only if the management cluster has the
    # root-ca-cert-publisher controller disabled.
    # caBundle: |
    #   -----BEGIN CERTIFICATE-----
    #   ...PEM...
    #   -----END CERTIFICATE-----
    serviceAccountName: lab-cp-publisher
    serviceAccountNamespace: openstack
  controlPlane:
    # Stable apiserver endpoint advertised by `kubeadm init`. Empty
    # acceptable for single-CP (kubeadm uses node primary IP). REQUIRED
    # when adding HA replicas in Milestone 1 — must match the LB VIP.
    endpoint: ""
    node:
      nodeName: blade01
      nodeUuid: 11111111-2222-3333-4444-555555555555
      driver: redfish
      driver_info:
        redfish_address: http://192.168.0.10:8000
        redfish_username: ironic
        redfish_password: baremetal
        redfish_system_id: /redfish/v1/Systems/blade01
      ports:
        - address: "00:60:2f:01:81:01"
          pxe_enabled: true
  workers:
    drainTimeout: 5m
    # To drain + remove a worker:
    #  1. Move its entry from `nodes` to `removed` below
    #  2. The chart renders a drain Job that runs `kubectl drain` against
    #     the workload apiserver (via the CP-published workload kubeconfig
    #     Secret). Job name: `drain-<clusterName>-<nodeName>`.
    #  3. Once the drain Job succeeds, the chart re-renders the worker's
    #     BaremetalHost with `spec.undeploy: true` (reusing the v0.3.4
    #     widened undeploy gate from charts/baremetal-host).
    #  4. Once the BH reports `available`, remove the entry from `removed`
    #     entirely — cdc deletes the BH and KOG fires DELETE on the Node.
    # removed:
    #   - nodeName: blade04
    #     nodeUuid: 44444444-2222-3333-4444-555555555555
    #     driver: redfish
    #     driver_info:
    #       redfish_address: http://192.168.0.13:8000
    #       redfish_username: ironic
    #       redfish_password: baremetal
    #       redfish_system_id: /redfish/v1/Systems/blade04
    #     undeployMode: full
    nodes:
      - nodeName: blade02
        nodeUuid: 22222222-2222-3333-4444-555555555555
        driver: redfish
        driver_info:
          redfish_address: http://192.168.0.11:8000
          redfish_username: ironic
          redfish_password: baremetal
          redfish_system_id: /redfish/v1/Systems/blade02
        ports:
          - address: "00:60:2f:02:81:01"
            pxe_enabled: true
      - nodeName: blade03
        nodeUuid: 33333333-2222-3333-4444-555555555555
        driver: redfish
        driver_info:
          redfish_address: http://192.168.0.12:8000
          redfish_username: ironic
          redfish_password: baremetal
          redfish_system_id: /redfish/v1/Systems/blade03
        ports:
          - address: "00:60:2f:03:81:01"
            pxe_enabled: true
