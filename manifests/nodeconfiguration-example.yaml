# Example NodeConfiguration for Ironic API (optional - for URL override)
# Reference from Node CR via spec.configurationRef
# apiVersion and kind are generated by oasgen-provider when configurationFields are set
#
# After applying RestDefinition, run: kubectl get crd | grep nodeconfiguration
# to see the generated CRD. Field names derive from X-Ironic-Endpoint (e.g. xIronicEndpoint).
#
# For standalone (auth_type=none), you may not need this - the default OAS servers URL is used.
---
apiVersion: baremetal.ogen.krateo.io/v1alpha1
kind: NodeConfiguration
metadata:
  name: ironic-standalone
  namespace: openstack
spec:
  # Override Ironic API base URL - field name from generated CRD
  # xIronicEndpoint: "http://ironic-api.openstack.svc.cluster.local:6385"
