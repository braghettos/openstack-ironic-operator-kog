# Keystone-auth reverse proxy to a real Ironic (OpenMetal). Lets the KOG operator (which speaks
# plain HTTP) talk to a Keystone-protected Ironic: the proxy authenticates with clouds.yaml,
# discovers the baremetal endpoint, and injects a fresh X-Auth-Token + microversion on every call.
#
# It listens on 8080 to match the `ironic` Service targetPort, so pointing the operator at
# OpenMetal is just repointing that Service's selector at this proxy (see `make openmetal-proxy-up`).
# The OAS server URL / operator config never change.
#
# Requires (created by `make openmetal-proxy-up`):
#   - Secret  openmetal-clouds       (your clouds.yaml)
#   - ConfigMap openmetal-proxy-script (scripts/openmetal-ironic-proxy.py)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openmetal-ironic-proxy
  namespace: openstack
  labels:
    app: openmetal-ironic-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openmetal-ironic-proxy
  template:
    metadata:
      labels:
        app: openmetal-ironic-proxy
    spec:
      containers:
        - name: proxy
          image: quay.io/airshipit/openstack-client:2026.1-ubuntu_noble
          command: ["python3", "/app/openmetal-ironic-proxy.py"]
          env:
            - name: OS_CLOUD
              value: "openstack"          # set to the cloud name in your clouds.yaml
            - name: OS_CLIENT_CONFIG_FILE
              value: /etc/openstack/clouds.yaml
            - name: OS_INTERFACE
              value: "public"
            - name: LISTEN_PORT
              value: "8080"
            - name: IRONIC_API_VERSION
              value: "1.81"
          ports:
            - name: api
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /v1/nodes
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 10
          volumeMounts:
            - name: script
              mountPath: /app
            - name: clouds
              mountPath: /etc/openstack
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: openmetal-proxy-script
        - name: clouds
          secret:
            secretName: openmetal-clouds
