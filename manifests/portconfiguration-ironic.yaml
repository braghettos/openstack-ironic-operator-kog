# Singleton PortConfiguration for the Ironic endpoint.
# Same rationale as nodeconfiguration-ironic.yaml: kept out of the per-node lifecycle release
# so rest-dynamic-controller still has it at delete-time. Applied by `make restdef-up`.
---
apiVersion: baremetal.ogen.krateo.io/v1alpha1
kind: PortConfiguration
metadata:
  name: ironic-endpoint
  namespace: openstack
spec:
  # Only verbs declared by restdefinition-port.yaml are accepted here. Port has findby/
  # create/delete (no `get`: GET /v1/ports/{uuid} is addressed by uuid, which we don't have
  # at observe-time; the RestDef relies on findby on MAC to resolve the port).
  configuration:
    header:
      create:
        X-Ironic-Endpoint: "http://ironic.openstack.svc.cluster.local:6385"
        X-OpenStack-Ironic-API-Version: "1.99"
      delete:
        X-Ironic-Endpoint: "http://ironic.openstack.svc.cluster.local:6385"
        X-OpenStack-Ironic-API-Version: "1.99"
      findby:
        X-Ironic-Endpoint: "http://ironic.openstack.svc.cluster.local:6385"
        X-OpenStack-Ironic-API-Version: "1.99"
