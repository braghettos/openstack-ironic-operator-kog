# RestDefinition for Ironic Node - used by oasgen-provider to generate Node CRD
# and deploy rest-dynamic-controller. Requires ConfigMap ironic-node-oas with OAS.
#
# Apply order:
#   1. kubectl create configmap ironic-node-oas -n openstack --from-file=ironic_node.yaml=../oas/ironic-node.yaml
#   2. kubectl apply -f restdefinition-node.yaml
# Note: the configmap key uses '_' (not '-') because KOG's oasPath regex disallows
# hyphens in the filename segment.
---
apiVersion: ogen.krateo.io/v1alpha1
kind: RestDefinition
metadata:
  name: ironic-node
  namespace: openstack
spec:
  oasPath: configmap://openstack/ironic-node-oas/ironic_node.yaml
  resourceGroup: baremetal.ogen.krateo.io
  resource:
    kind: Node
    identifiers:
      - name
    additionalStatusFields:
      - uuid
      - provision_state
      - power_state
      - target_provision_state
      # Inspection outputs — surfaced in Node CR status so the baremetal-discovery
      # composition (or any operator/policy) can read inventory + completion timestamp
      # without going through openstacksdk. `properties` is the freeform object Ironic
      # populates after inspect (cpus, memory_mb, local_gb, cpu_arch, capabilities, ...).
      - properties
      - inspection_started_at
      - inspection_finished_at
      # instance_info: surfaced so the baremetal-host chart's transition-undeploy can detect
      # spec.image vs deployed-image drift and trigger a redeploy without manual intervention.
      - instance_info
      # automated_clean: surfaced so the chart's pre-delete Job can observe the current
      # cleanup mode setting (PATCHes it before driving target=deleted).
      - automated_clean
    # uuid is writable on POST in Ironic (the conductor uses the supplied value instead of
    # generating one). We DROP the excludedSpecFields entry for it so callers can pin a UUID
    # via spec.uuid — required when other Nodes reference this one via parent_node and we
    # need stable IDs across re-enroll. status.uuid still mirrors what Ironic returned.
    configurationFields:
      - fromOpenAPI:
          name: X-Ironic-Endpoint
          in: header
        fromRestDefinition:
          actions:
            - "*"
      - fromOpenAPI:
          name: X-OpenStack-Ironic-API-Version
          in: header
        fromRestDefinition:
          actions:
            - "*"
    verbsDescription:
      - action: findby
        method: GET
        path: /v1/nodes
        identifiersMatchPolicy: OR
      - action: get
        method: GET
        path: /v1/nodes/{uuid}
        requestFieldMapping:
          # Ironic accepts the node NAME as the {ident} in /v1/nodes/{ident}, so map the
          # path param to spec.name (always known) instead of the uuid (unknown until
          # after create). This makes observe = GET /v1/nodes/<name> -> 404 (create) or 200.
          - inPath: uuid
            inCustomResource: spec.name
      - action: create
        method: POST
        path: /v1/nodes
      # `update` verb is enabled now that the keystone-ironic-proxy auto-translates the plain
      # JSON body KOG sends into RFC-6902 JSON-Patch (see `_diff_to_json_patch` in
      # scripts/keystone-ironic-proxy.py). Without that translator Ironic returns 400
      # "Adding a non-existent attribute" or similar on a merge-style body.
      # Caveat: PATCH during `cleaning` clears instance_info — keep `update` calls limited
      # to states where it is safe (manageable / available / active) by gating from the chart.
      - action: update
        method: PATCH
        path: /v1/nodes/{uuid}
        requestFieldMapping:
          - inPath: uuid
            inCustomResource: spec.name
      - action: delete
        method: DELETE
        path: /v1/nodes/{uuid}
        requestFieldMapping:
          # Ironic accepts the node NAME as the {ident} in /v1/nodes/{ident}, so map the
          # path param to spec.name (always known) instead of the uuid (unknown until
          # after create). This makes observe = GET /v1/nodes/<name> -> 404 (create) or 200.
          - inPath: uuid
            inCustomResource: spec.name
