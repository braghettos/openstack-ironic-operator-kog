# WireGuard tunnel + Keystone-auth Ironic proxy, scoped to the cluster (no host VPN needed).
# The operator pods talk to the in-cluster `ironic` Service; this pod has the WireGuard interface
# and the Keystone proxy share the same netns, so /v1/nodes calls travel:
#   operator pod -> Service ironic:6385 -> this pod:8080 (proxy) -> WG -> real Keystone+Ironic
#
# Requires (created by `make lab-up` from your local files):
#   - Secret  ironic-wg-config              key wg0.conf  (local/wireguard/ironic-lab.conf)
#   - Secret  ironic-clouds                 key clouds.yaml (./clouds.yaml)
#   - ConfigMap keystone-ironic-proxy-script (scripts/keystone-ironic-proxy.py)
---
apiVersion: v1
kind: Namespace
metadata:
  name: openstack
---
# ServiceAccount + RBAC for the kubectl-proxy sidecar inside
# wg-ironic-proxy. Scoped to JUST what the kubernetescluster blueprint's
# bootstrap CP needs to do: patch any Node CR's spec.extra
# (publish kubeadm_join / cert_key) and create+get Secrets in openstack
# (workload kubeconfig delivery). NOT cluster-admin.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wg-ironic-proxy
  namespace: openstack
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wg-ironic-proxy
  namespace: openstack
rules:
  # Bridge mirrors Ironic.node.extra into Node CR.spec.extra (kubeadm_join,
  # cert_key). Reaper also touches ports / nodeprovisions / nodepowers when
  # a half-failed helm install leaves them stranded with a stale
  # meta.helm.sh/release-name annotation; patch is needed to strip the
  # finalizer before deleting.
  - apiGroups:
      - baremetal.ogen.krateo.io
    resources:
      - nodes
      - ports
      - nodeprovisions
      - nodepowers
    verbs:
      - get
      - list
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wg-ironic-proxy
  namespace: openstack
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wg-ironic-proxy
subjects:
  - kind: ServiceAccount
    name: wg-ironic-proxy
    namespace: openstack
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wg-ironic-proxy
  namespace: openstack
  labels:
    app: wg-ironic-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wg-ironic-proxy
  template:
    metadata:
      labels:
        app: wg-ironic-proxy
      annotations:
        # bumps with the bridge script so the pod rolls when the script changes
        kubernetescluster.ogen.krateo.io/bridge-revision: "4"
    spec:
      serviceAccountName: wg-ironic-proxy
      containers:
        - name: ironic-extra-bridge
          # Ironic node.extra -> k8s Node CR spec.extra bridge.
          # The blade (which can reach Ironic over its OOB network but
          # NOT our wg-tunnel-side mgmt API) publishes its kubeadm_join
          # into Ironic node.extra. This sidecar polls Ironic via the
          # same-pod keystone proxy (127.0.0.1:8080) and propagates
          # to Node.spec.extra so the kubernetes-cluster chart's lookup
          # sees the join command. See
          # scripts/ironic-node-extra-bridge.py for the loop logic.
          image: python:3.13-slim
          command:
            - python3
            - /scripts/ironic-node-extra-bridge.py
          env:
            - name: IRONIC_API_VERSION
              value: "1.109"
            - name: BRIDGE_INTERVAL
              value: "10"
          volumeMounts:
            - name: bridge-script
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
        - name: mgmt-api-proxy
          # kubectl proxy bound on the wg pod's tunnel interface
          # (198.51.100.5 inside the pod netns). The bare-metal blades
          # reach the management apiserver as http://198.51.100.5:8443
          # via the wg tunnel; this sidecar forwards their requests to
          # the in-cluster kubernetes.default.svc:443 using its own SA
          # token. Auth model: the SA is RBAC-scoped to JUST what the
          # kubernetescluster chart needs the CPs to do (patch the CP's
          # own Node CR's spec.extra, create+get Secrets in openstack
          # ns for the workload-kubeconfig delivery).
          #
          # kubectl proxy default port is 8001; --address binds on the
          # wg interface specifically.
          image: rancher/kubectl:v1.31.4
          args:
            - proxy
            - --address=198.51.100.5
            - --port=8443
            - --accept-hosts=.*
            - --accept-paths=.*
            - --reject-paths=^$
            - --disable-filter=true
          # No volumeMounts — uses the projected SA token automatically.
        - name: proxy
          image: quay.io/airshipit/openstack-client:2026.1-ubuntu_noble
          command:
            - bash
            - "-c"
          args:
            - |
              set -e
              echo "[startup] installing wireguard-tools + iproute2 ..."
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              apt-get install -y -qq --no-install-recommends wireguard-tools iproute2 iputils-ping curl ca-certificates
              # wireguard-go fallback in case the kind node kernel lacks the WG module
              if ! lsmod 2>/dev/null | grep -q wireguard && ! modinfo wireguard >/dev/null 2>&1; then
                if ! command -v wireguard-go >/dev/null 2>&1; then
                  echo "[startup] kernel WG unavailable; fetching wireguard-go..."
                  arch=$(uname -m); case "$arch" in x86_64) wgarch=amd64;; aarch64|arm64) wgarch=arm64;; esac
                  curl -fsSL "https://github.com/WireGuard/wireguard-go/releases/latest/download/wireguard-go-linux-$wgarch" \
                    -o /usr/local/bin/wireguard-go && chmod +x /usr/local/bin/wireguard-go || true
                fi
              fi
              install -m 600 /wg-config/wg0.conf /etc/wireguard/wg0.conf
              # On container restart wg0 lingers in the pod netns; tear it down before re-up
              wg-quick down /etc/wireguard/wg0.conf 2>/dev/null || ip link delete wg0 2>/dev/null || true
              echo "[startup] wg-quick up ..."
              wg-quick up /etc/wireguard/wg0.conf
              wg show
              ip -4 addr show wg0 || true
              ip route | head -5
              echo "[startup] launching keystone-ironic-proxy ..."
              exec python3 /app/keystone-ironic-proxy.py
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          env:
            - name: OS_CLOUD
              # Reverted to system-scoped (`ironic-system` in clouds.yaml) — the project-
              # scoped path returned 403 on POST /v1/ports for fresh Nodes whose owner field
              # wasn't yet set, breaking the kubernetes-cluster blueprint's deploy walk.
              # See reference_ironic-system-scope-clouds memory for the policy detail.
              value: "ironic-system"
            - name: OS_CLIENT_CONFIG_FILE
              value: /etc/openstack/clouds.yaml
            - name: OS_INTERFACE
              value: "public"
            - name: LISTEN_PORT
              value: "8080"
            - name: IRONIC_API_VERSION
              # Default microversion when the client (KOG/RDC) doesn't send one. 1.109 is
              # what the openstackclient CLI defaults to; project-scoped RBAC for write ops
              # has owner-based checks that work cleanly at this version.
              value: "1.109"
          ports:
            - name: api
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /v1/nodes
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 8
            failureThreshold: 12
          volumeMounts:
            - name: wg-config
              mountPath: /wg-config
              readOnly: true
            - name: script
              mountPath: /app
            - name: clouds
              mountPath: /etc/openstack
              readOnly: true
      volumes:
        - name: wg-config
          secret:
            secretName: ironic-wg-config
            defaultMode: 0400
        - name: script
          configMap:
            name: keystone-ironic-proxy-script
        - name: clouds
          secret:
            secretName: ironic-clouds
            defaultMode: 0400
        - name: bridge-script
          configMap:
            name: ironic-extra-bridge-script
---
apiVersion: v1
kind: Service
metadata:
  name: ironic
  namespace: openstack
  labels:
    app: wg-ironic-proxy
spec:
  selector:
    app: wg-ironic-proxy
  ports:
    - name: api
      port: 6385
      targetPort: 8080
---
# Reachable from inside the cluster as
# http://mgmt-api.openstack.svc.cluster.local:8443. From the blade
# network it's http://198.51.100.5:8443 (the wg-bound sidecar).
apiVersion: v1
kind: Service
metadata:
  name: mgmt-api
  namespace: openstack
  labels:
    app: wg-ironic-proxy
spec:
  selector:
    app: wg-ironic-proxy
  ports:
    - name: kubectl-proxy
      port: 8443
      targetPort: 8443
