# Minimal OpenAPI 3.0 spec for Ironic Node resource (CRUD only)
# Used by oasgen-provider to generate Node CRD for rest-dynamic-controller
# Ref: https://docs.openstack.org/api-ref/baremetal/

openapi: 3.0.3
info:
  title: Ironic Bare Metal Node API
  description: Minimal spec for Node CRUD (state transitions via Jobs)
  version: 1.0.0

servers:
  - url: http://ironic.openstack.svc.cluster.local:6385
    description: Ironic API (override via NodeConfiguration)

paths:
  /v1/nodes:
    get:
      summary: List nodes
      operationId: listNodes
      # No query filters: Ironic's node list rejects ?name=/?provision_state=
      # ("Unexpected arguments"). rest-dynamic-controller lists all nodes and matches
      # the `name` identifier client-side (findby identifiersMatchPolicy).
      parameters:
        - $ref: '#/components/parameters/X-Ironic-Endpoint'
        - $ref: '#/components/parameters/X-OpenStack-Ironic-API-Version'
      responses:
        '200':
          description: List of nodes
          content:
            application/json:
              schema:
                type: object
                properties:
                  nodes:
                    type: array
                    items:
                      $ref: '#/components/schemas/Node'
    post:
      summary: Create node
      operationId: createNode
      parameters:
        - $ref: '#/components/parameters/X-Ironic-Endpoint'
        - $ref: '#/components/parameters/X-OpenStack-Ironic-API-Version'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeCreate'
      responses:
        '201':
          description: Created node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'

  /v1/nodes/{uuid}:
    parameters:
      - name: uuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get node by UUID
      operationId: getNode
      parameters:
        - $ref: '#/components/parameters/X-Ironic-Endpoint'
        - $ref: '#/components/parameters/X-OpenStack-Ironic-API-Version'
      responses:
        '200':
          description: Node details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '404':
          description: Node not found
    patch:
      summary: Update node
      operationId: updateNode
      parameters:
        - $ref: '#/components/parameters/X-Ironic-Endpoint'
        - $ref: '#/components/parameters/X-OpenStack-Ironic-API-Version'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodePatch'
      responses:
        '200':
          description: Updated node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
    delete:
      summary: Delete node
      operationId: deleteNode
      parameters:
        - $ref: '#/components/parameters/X-Ironic-Endpoint'
        - $ref: '#/components/parameters/X-OpenStack-Ironic-API-Version'
      responses:
        '204':
          description: Node deleted
        '404':
          description: Node not found

components:
  parameters:
    X-Ironic-Endpoint:
      name: X-Ironic-Endpoint
      in: header
      required: false
      description: Override Ironic API base URL (used by NodeConfiguration)
      schema:
        type: string
    X-OpenStack-Ironic-API-Version:
      name: X-OpenStack-Ironic-API-Version
      in: header
      required: false
      description: Ironic API microversion (Ironic rejects write requests without it). Set via NodeConfiguration.
      schema:
        type: string
  schemas:
    Node:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        driver:
          type: string
        driver_info:
          type: object
          additionalProperties: true
        provision_state:
          type: string
          readOnly: true
        target_provision_state:
          type: string
          readOnly: true
        power_state:
          type: string
          readOnly: true
        instance_info:
          type: object
          additionalProperties: true
        properties:
          type: object
          additionalProperties: true
        extra:
          type: object
          additionalProperties: true
        maintenance:
          type: boolean
        automated_clean:
          type: boolean
          nullable: true
          description: |
            Whether Ironic runs its standard cleaning pass after a delete (target=deleted).
            null = use ironic.conf [conductor]automated_clean default (usually true).
            false = skip the cleaning pass entirely; node goes deleted->available with no
                    IPA boot. Used by chart's pre-delete Job when spec.undeploy.mode=none.
            Available since API microversion 1.47.
        network_interface:
          type: string
        resource_class:
          type: string
        parent_node:
          type: string
          description: UUID of the parent Node when this Node is a child (e.g. blade under an enclosure).
        inspection_started_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp set by Ironic when an inspection starts.
        inspection_finished_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp set by Ironic when an inspection finishes successfully. Empty until the first inspect runs; populated from then on.

    NodeCreate:
      type: object
      required:
        - driver
      properties:
        # uuid is optional on POST; when set, Ironic uses it instead of generating one.
        # Required when other Nodes reference this Node via parent_node and we need stable IDs.
        uuid:
          type: string
          format: uuid
        name:
          type: string
        driver:
          type: string
        driver_info:
          type: object
          additionalProperties: true
        instance_info:
          type: object
          additionalProperties: true
        properties:
          type: object
          additionalProperties: true
        extra:
          type: object
          additionalProperties: true
        network_interface:
          type: string
        resource_class:
          type: string
        parent_node:
          type: string
          description: UUID of the parent Node when this Node is a child (e.g. blade under an enclosure).
        maintenance:
          type: boolean
          description: When true, suspends Ironic auto-actions (power monitoring etc.) for the node.
        automated_clean:
          type: boolean
          nullable: true
          description: |
            When false, Ironic skips the standard cleaning pass between deleted and available
            (no IPA boot). Used by the chart pre-delete Job when spec.undeploy.mode=none.
            null = use ironic.conf [conductor]automated_clean default (usually true).
            Available since API microversion 1.47.

    NodePatch:
      # Fields KOG/RDC is allowed to PATCH in a Node. The keystone-ironic-proxy translates
      # the plain JSON body into RFC-6902 JSON-Patch before forwarding to Ironic, so this
      # schema only governs which fields KOG considers "updateable", NOT the wire format.
      # Add fields here as we want them to flow back from Node CR spec -> Ironic.
      type: object
      properties:
        name:
          type: string
        driver_info:
          type: object
          additionalProperties: true
        instance_info:
          type: object
          additionalProperties: true
        properties:
          type: object
          additionalProperties: true
        extra:
          type: object
          additionalProperties: true
        resource_class:
          type: string
        network_interface:
          type: string
        description:
          type: string
        maintenance:
          type: boolean
        automated_clean:
          type: boolean
          nullable: true
